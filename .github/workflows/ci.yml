name: CI

# Read-only by default. The typecheck job doesn't push, comment, or
# mutate anything — explicit minimal permissions block keeps the
# default-write fallback closed.
permissions:
  contents: read

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned by commit SHA (not floating tags) to
      # blunt supply-chain attacks. Bump via: gh api repos/<owner>/<repo>/git/refs/tags/v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
